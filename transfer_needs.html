<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 편입이 필요한 사람일까? | 김영편입</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #1a1a24;
    --accent: #ff4d6d;
    --text: #f0f0f8;
    --muted: #8888a0;
    --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; top:-200px; left:-200px;
    width:600px; height:600px;
    background: radial-gradient(circle, rgba(255,77,109,0.10) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; bottom:-200px; right:-200px;
    width:600px; height:600px;
    background: radial-gradient(circle, rgba(255,140,66,0.08) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }
  .wrap { max-width:420px; margin:0 auto; padding:0 16px 60px; position:relative; z-index:1; }

  /* COVER */
  #cover {
    min-height:100vh; display:flex; flex-direction:column;
    justify-content:center; align-items:center; text-align:center; padding:60px 0 40px;
  }
  .brand-pill {
    display:inline-flex; align-items:center; gap:5px;
    background:#12122a; color:#fff;
    font-size:11px; font-weight:800; padding:5px 14px; border-radius:20px;
    margin-bottom:26px; letter-spacing:0.06em;
    animation: fadeUp 0.5s ease both;
  }
  .cover-emoji {
    font-size:58px; margin-bottom:18px; display:block; line-height:1;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .cover-title {
    font-size: clamp(26px,7.5vw,34px); font-weight:900;
    line-height:1.28; margin-bottom:13px; letter-spacing:-0.025em;
    animation: fadeUp 0.5s 0.15s ease both;
  }
  .cover-title em { color:#ff4d6d; font-style:normal; }
  .cover-sub {
    color:var(--muted); font-size:14px; font-weight:500;
    line-height:1.7; margin-bottom:34px;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .score-dots {
    display:flex; gap:8px; justify-content:center; margin-bottom:38px;
    animation: fadeUp 0.5s 0.25s ease both;
  }
  .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.14); }
  .btn-start {
    background:#ff4d6d; color:#fff; border:none; border-radius:13px;
    padding:15px 48px;
    font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:800;
    cursor:pointer; letter-spacing:-0.01em;
    transition: transform 0.18s, opacity 0.18s;
    animation: fadeUp 0.5s 0.3s ease both;
  }
  .btn-start:hover { opacity:.88; transform:translateY(-2px); }

  /* QUIZ */
  #quiz { display:none; padding-top:34px; }
  .prog-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
  .prog-label { font-size:11px; font-weight:800; color:#ff4d6d; letter-spacing:0.05em; }
  .prog-count { font-size:11px; font-weight:500; color:var(--muted); }
  .prog-track { height:4px; background:rgba(255,255,255,0.07); border-radius:99px; overflow:hidden; margin-bottom:26px; }
  .prog-fill { height:100%; background:#ff4d6d; border-radius:99px; transition:width 0.4s cubic-bezier(.4,0,.2,1); }

  .q-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:26px 22px; margin-bottom:14px;
    animation: fadeUp 0.35s ease both;
  }
  .q-badge { font-size:11px; font-weight:800; color:#ff4d6d; letter-spacing:0.12em; margin-bottom:11px; }
  .q-text {
    font-size: clamp(16px,4.5vw,19px); font-weight:800;
    line-height:1.5; margin-bottom:13px; letter-spacing:-0.022em; color:#f0f0f8;
  }
  .q-sub {
    font-size:13px; font-weight:400; color:var(--muted); line-height:1.65;
    border-left:2px solid #ff4d6d; padding:8px 12px;
    border-radius:0 8px 8px 0; margin-bottom:22px;
    background:rgba(255,255,255,0.03); font-style:italic;
  }
  .choices { display:flex; flex-direction:column; gap:9px; }
  .choice-btn {
    background:rgba(255,255,255,0.04); border:1.5px solid var(--border);
    border-radius:12px; padding:14px 16px; color:var(--text);
    font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:600;
    cursor:pointer; text-align:left; transition:all 0.18s;
    display:flex; align-items:center; gap:11px; letter-spacing:-0.01em;
  }
  .choice-icon {
    width:29px; height:29px; border-radius:50%;
    background:rgba(255,255,255,0.07);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; flex-shrink:0; transition:background 0.18s;
  }
  .choice-btn:hover { border-color:rgba(255,77,109,0.45); background:rgba(255,77,109,0.07); transform:translateX(3px); }
  .choice-btn.selected-yes { border-color:#ff4d6d; background:rgba(255,77,109,0.12); }
  .choice-btn.selected-yes .choice-icon { background:#ff4d6d; }
  .choice-btn.selected-no { border-color:rgba(255,255,255,0.18); background:rgba(255,255,255,0.05); }
  .score-chip {
    display:inline-block; background:rgba(255,209,102,0.11);
    border:1px solid rgba(255,209,102,0.22); color:#ffd166;
    font-size:10px; font-weight:700; letter-spacing:0.08em;
    padding:3px 10px; border-radius:100px; margin-top:11px;
  }

  /* RESULT */
  #result { display:none; padding-top:34px; }
  .r-hero {
    background:#12122a; border-radius:20px; padding:26px 22px;
    text-align:center; display:flex; flex-direction:column;
    align-items:center; gap:10px; margin-bottom:12px;
    animation: fadeUp 0.4s ease both;
  }
  .r-icon { font-size:46px; line-height:1; }
  .r-score-badge { font-size:12px; font-weight:800; padding:5px 14px; border-radius:20px; background:#ff4d6d; color:#fff; letter-spacing:0.04em; }
  .r-title { font-size:clamp(19px,5.5vw,23px); font-weight:900; color:#fff; line-height:1.35; letter-spacing:-0.022em; }
  .r-title em { color:#ff4d6d; font-style:normal; }
  .r-tagline { font-size:13px; font-weight:400; color:rgba(255,255,255,0.48); line-height:1.65; }

  .facts { display:flex; flex-direction:column; gap:9px; margin-bottom:12px; animation:fadeUp 0.4s 0.08s ease both; }
  .fact-item {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:15px 17px;
    display:flex; align-items:flex-start; gap:11px;
  }
  .fact-icon { font-size:19px; flex-shrink:0; margin-top:1px; }
  .fact-text strong { display:block; font-size:13px; font-weight:800; margin-bottom:2px; letter-spacing:-0.01em; }
  .fact-text span { font-size:12px; font-weight:400; color:var(--muted); line-height:1.6; }

  /* 설명회 CTA */
  .seminar-cta {
    background:#12122a; border-radius:18px; padding:20px 18px;
    display:flex; flex-direction:column; gap:10px;
    margin-bottom:12px; animation:fadeUp 0.4s 0.14s ease both;
  }
  .sem-top-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .sem-date-pill { background:#ff4d6d; color:#fff; font-size:11px; font-weight:800; padding:4px 10px; border-radius:20px; letter-spacing:0.03em; }
  .sem-loc-pill { background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.7); font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; }
  .sem-title { font-size:15px; font-weight:900; color:#fff; line-height:1.4; letter-spacing:-0.02em; }
  .sem-title em { color:#ff4d6d; font-style:normal; }
  .sem-time { font-size:12px; font-weight:400; color:rgba(255,255,255,0.35); margin-top:-3px; }
  .sem-body { font-size:12px; font-weight:400; color:rgba(255,255,255,0.48); line-height:1.7; }
  .btn-sem {
    width:100%; padding:14px 0; border-radius:11px; border:none;
    background:#ff4d6d; color:#fff;
    font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:900;
    cursor:pointer; letter-spacing:-0.01em; transition:opacity 0.15s;
  }
  .btn-sem:hover { opacity:.88; }
  .btn-consult {
    width:100%; padding:12px 0; border-radius:11px; border:none;
    background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.72);
    font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:600;
    cursor:pointer; transition:opacity 0.15s;
  }
  .btn-consult:hover { opacity:.8; }

  .share-strip {
    display:flex; align-items:center; justify-content:space-between; padding:0 2px;
    margin-bottom:9px; animation:fadeUp 0.4s 0.18s ease both;
  }
  .share-txt { font-size:12px; font-weight:500; color:var(--muted); }
  .btn-sh {
    display:flex; align-items:center; gap:5px;
    padding:8px 13px; border-radius:8px;
    border:1px solid var(--border); background:var(--card);
    font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:600;
    color:var(--text); cursor:pointer; transition:border-color 0.15s;
  }
  .btn-sh:hover { border-color:rgba(255,255,255,0.2); }
  .btn-retry {
    width:100%; padding:12px 0; border-radius:11px;
    border:1px solid var(--border); background:transparent;
    font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:500;
    color:var(--muted); cursor:pointer; transition:all 0.15s;
    animation:fadeUp 0.4s 0.2s ease both;
  }
  .btn-retry:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .toast {
    position:fixed; top:20px; left:50%;
    transform:translate(-50%,-80px);
    background:#f0f0f8; color:#0a0a0f;
    padding:10px 22px; border-radius:100px;
    font-size:13px; font-weight:700; z-index:999;
    opacity:0; pointer-events:none;
    transition:transform 0.3s ease, opacity 0.3s ease; white-space:nowrap;
  }
  .toast.show { transform:translate(-50%,0); opacity:1; }
</style>
</head>
<body>
<div class="wrap">

  <section id="cover">
    <span class="brand-pill">✦ 김영편입</span>
    <span class="cover-emoji">🤔</span>
    <h1 class="cover-title">나는 편입이<br><em>필요한 사람</em>일까?</h1>
    <p class="cover-sub">5가지 질문으로 알아보는<br>나의 편입 필요도 테스트</p>
    <div class="score-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">지금 확인하기 →</button>
  </section>

  <section id="quiz">
    <div class="prog-row">
      <span class="prog-label">편입 필요도</span>
      <span class="prog-count" id="prog-count">1 / 5</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill" style="width:20%"></div>
    </div>
    <div id="q-area"></div>
  </section>

  <section id="result"></section>
</div>

<div class="toast" id="toast"></div>

<script>
const FORM    = 'https://forms.gle/jbSNNzMGSR4by4a67';
const CONSULT = 'https://www.kimyoung.co.kr/cust/cust_sub03.asp';

const questions = [
  { num:'Q 01', text:'수능 점수가 아쉬워서\n지금 대학에 왔다',
    sub:'"재수는 싫었고, 일단 왔는데\n아직도 그때 생각이 가끔 난다..."',
    yes:'맞아, 완전 나 얘기야 😮‍💨', no:'아니, 나는 만족해' },
  { num:'Q 02', text:'취업할 때 학교 이름이\n걸릴 것 같다는 생각을 해봤다',
    sub:'"스펙은 쌓고 있는데\n서류에서 막히면 어쩌지..."',
    yes:'솔직히 한 번쯤 생각해봤어 💭', no:'별로 신경 안 써' },
  { num:'Q 03', text:'지금 다니는 과가\n나랑 안 맞는 것 같다',
    sub:'"전과는 너무 힘들고\n처음부터 다시 하고 싶다..."',
    yes:'맞아, 전과도 힘들고 고민 중이야 😶', no:'아니, 나는 내 과 좋아' },
  { num:'Q 04', text:'"너 왜 거기 다녀?"라는\n말을 들어본 적 있다',
    sub:'별말 아닌 척 웃었지만...\n사실 좀 상처받았다',
    yes:'있어, 그냥 웃고 넘겼어 🙁', no:'없어, 그런 말 들어본 적 없어' },
  { num:'Q 05', text:'다른 방법이 있다면\n지금이라도 도전해보고 싶다',
    sub:'"수능 말고 다른 루트가 있다면\n나 진짜 해볼 것 같은데..."',
    yes:'방법만 있으면 당장이라도! 🔥', no:'지금 현실에 만족해' }
];

let current=0, score=0;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function startQuiz(){
  document.getElementById('cover').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQ();
}

function renderQ(){
  const q=questions[current];
  const pct=((current+1)/questions.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-count').textContent=(current+1)+' / '+questions.length;
  document.getElementById('q-area').innerHTML=`
    <div class="q-card">
      <div class="q-badge">${q.num}</div>
      <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
      <div class="q-sub">${q.sub.replace(/\n/g,'<br>')}</div>
      <div class="choices">
        <button class="choice-btn" id="btn-yes" onclick="answer(1)">
          <span class="choice-icon">✓</span><span>${q.yes}</span>
        </button>
        <button class="choice-btn" id="btn-no" onclick="answer(0)">
          <span class="choice-icon">✗</span><span>${q.no}</span>
        </button>
      </div>
      <div style="text-align:right"><span class="score-chip">해당되면 +1점</span></div>
    </div>`;
}

function answer(val){
  const y=document.getElementById('btn-yes'), n=document.getElementById('btn-no');
  if(val===1){ y.classList.add('selected-yes'); n.style.opacity='0.32'; score++; }
  else        { n.classList.add('selected-no');  y.style.opacity='0.32'; }
  y.onclick=null; n.onclick=null;
  setTimeout(()=>{ current++; current<questions.length?renderQ():showResult(); },480);
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const res=document.getElementById('result');
  res.style.display='block';

  let icon,badge,title,desc,semMsg;
  if(score<=2){
    icon='🟡'; badge=score+' / 5점';
    title='편입, 슬슬<br><em>알아볼 때예요</em>';
    desc='아직 크게 불만은 없지만, 한 번쯤 가능성을 열어두세요.<br>편입은 생각보다 훨씬 현실적인 루트예요.';
    semMsg='편입이 아직 낯설다면? 6월 20일 설명회에서 한 번에 싹 다 알아가세요!';
  } else if(score<=4){
    icon='🟠'; badge=score+' / 5점';
    title='편입이 꽤 잘 맞는<br><em>선택이에요</em>';
    desc='지금 상황이 계속 걸린다면 바꿀 수 있을 때 바꾸는 게 맞아요.<br>6개월만 투자해도 충분히 달라질 수 있어요.';
    semMsg='어느 정도 알고 있는데 확신이 없다면? 6월 20일 설명회에서 빈틈을 채워가세요!';
  } else {
    icon='🔴'; badge=score+' / 5점';
    title='지금 바로<br><em>편입 알아보세요</em>';
    desc='이미 마음속으로 답 나와 있잖아요 😏<br>수능 없이, 지금 학점으로 SKY·연·고 도전이 가능합니다.';
    semMsg='이미 마음은 정해졌어요. 6월 20일 설명회에서 합격 전략까지 완성하고 가세요.';
  }

  res.innerHTML=`
    <div class="brand-pill" style="margin-bottom:14px;">✦ 퀴즈 결과</div>
    <div class="r-hero">
      <div class="r-icon">${icon}</div>
      <div class="r-score-badge">${badge}</div>
      <div class="r-title">${title}</div>
      <div class="r-tagline">${desc}</div>
    </div>
    <div class="facts">
      <div class="fact-item">
        <span class="fact-icon">🎓</span>
        <div class="fact-text">
          <strong>수능 없이 도전 가능</strong>
          <span>상위권대학, 영어 1과목 or 영어+수학 2과목으로도 목표대학 합격할 수 있어요.</span>
        </div>
      </div>
      <div class="fact-item">
        <span class="fact-icon">📅</span>
        <div class="fact-text">
          <strong>6개월 준비로 상위권 합격</strong>
          <span>집중 준비 6개월이면 인서울 TOP이 현실이 됩니다.</span>
        </div>
      </div>
      <div class="fact-item">
        <span class="fact-icon">🏆</span>
        <div class="fact-text">
          <strong>누적 합격생 수 25만 7천명, 김영편입</strong>
          <span>30년 이상의 노하우로 매년 최다 합격자를 배출하고 있어요.</span>
        </div>
      </div>
    </div>
    <div class="seminar-cta">
      <div class="sem-top-row">
        <div class="sem-date-pill">6월 20일 (토)</div>
        <div class="sem-loc-pill">서울 · 대전 · 대구 · 부산</div>
      </div>
      <div class="sem-title">김영편입<br><em>27/28학년도 여름방학 단기전략 설명회</em></div>
      <div class="sem-time">14:00 — 16:00</div>
      <div class="sem-body">${semMsg}</div>
      <button class="btn-sem" onclick="window.open(FORM,'_blank')">설명회 신청하기 →</button>
      <button class="btn-consult" onclick="window.open(CONSULT,'_blank')">상담 신청하기</button>
    </div>
    <div class="share-strip">
      <span class="share-txt">친구한테 공유하기</span>
      <button class="btn-sh" onclick="copyLink()">🔗 링크 복사</button>
    </div>
    <button class="btn-retry" onclick="retryQuiz()">↺ 다시 테스트하기</button>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryQuiz(){
  current=0; score=0;
  document.getElementById('result').style.display='none';
  document.getElementById('cover').style.display='flex';
}

function copyLink(){
  const url=window.location.href;
  navigator.clipboard
    ? navigator.clipboard.writeText(url).then(()=>showToast('링크 복사 완료! 🔗'))
    : showToast('링크: '+url);
}
</script>
</body>
</html>
